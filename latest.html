<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>daszi — Kumbasaram (Latest Release)</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--fg:#e8e4de;--white:#fff;--muted:#5a5a5a;--ml:#8a8a8a;--border:#1a1a1a;--bl:#2a2a2a}
html{scroll-behavior:smooth;font-size:17px}
body{background:var(--bg);color:var(--fg);font-family:'Instrument Sans',sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::selection{background:var(--white);color:#000}
a{color:inherit;text-decoration:none}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
nav{position:fixed;top:0;left:0;width:100%;z-index:100;padding:1.5rem 3rem;display:flex;align-items:center;justify-content:space-between;transition:all .5s}
nav.scrolled{background:rgba(10,10,10,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-brand{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:300;letter-spacing:.3em;text-transform:lowercase;color:var(--ml)}
.nav-links{display:flex;gap:2.5rem}
.nav-links a{font-size:.8rem;letter-spacing:.25em;text-transform:uppercase;color:var(--ml);font-weight:500;transition:color .3s}
.nav-links a:hover{color:var(--white)}
.nav-toggle{display:none;flex-direction:column;gap:5px;cursor:pointer;z-index:101;padding:4px}
.nav-toggle span{display:block;width:22px;height:1.5px;background:var(--ml);transition:all .3s}
.nav-toggle.active span:nth-child(1){transform:rotate(45deg) translate(4px,5px)}
.nav-toggle.active span:nth-child(2){opacity:0}
.nav-toggle.active span:nth-child(3){transform:rotate(-45deg) translate(4px,-5px)}
/* PAGE BG */
.page-bg{position:fixed;inset:0;z-index:-1}
.page-bg img{width:100%;height:100%;object-fit:cover;opacity:.08;filter:grayscale(100%)}

/* HERO */
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0}
.hero-bg img{width:100%;height:100%;object-fit:cover;opacity:.15;filter:blur(30px) saturate(1.5);transform:scale(1.1)}
.hero-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(10,10,10,.3),rgba(10,10,10,.95) 70%)}
.hero-bg::before{content:'';position:absolute;inset:0;z-index:1;background:linear-gradient(to bottom,var(--bg),transparent 20%,transparent 80%,var(--bg) 100%)}
.hero-inner{position:relative;z-index:1;display:grid;grid-template-columns:1fr 1.2fr;gap:5rem;max-width:1000px;align-items:center;padding:0 2rem}
.art-wrap{position:relative}
.art-img{width:100%;aspect-ratio:1;border:1px solid var(--bl);overflow:hidden;box-shadow:0 20px 80px rgba(0,0,0,.6)}
.art-img img{width:100%;height:100%;object-fit:cover}
.art-glow{position:absolute;inset:-30%;z-index:-1;background:radial-gradient(circle,rgba(200,164,78,.06),transparent 60%)}
.track-info{display:flex;flex-direction:column;gap:1.5rem}
.track-label{font-size:.75rem;letter-spacing:.5em;text-transform:uppercase;color:var(--ml)}
.track-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,5vw,4rem);font-weight:300;line-height:1.1}
.track-artists{font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:var(--ml);font-weight:300;font-style:italic}
.track-meta{font-size:.75rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase}
.stream-links{display:flex;gap:1rem;flex-wrap:wrap;margin-top:.5rem}
.stream-btn{padding:.8rem 1.8rem;font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;border:1px solid var(--bl);color:var(--fg);font-family:'Instrument Sans',sans-serif;font-weight:500;transition:all .4s;display:inline-flex;align-items:center;gap:.5rem}
.stream-btn:hover{border-color:var(--white);color:var(--white)}
.stream-btn.primary{background:var(--white);color:#000;border-color:var(--white)}
.stream-btn.primary:hover{background:transparent;color:var(--white)}
/* VIDEO */
.video-section{padding:5rem 3rem;border-top:1px solid var(--border)}
.video-section .sl{font-size:.8rem;letter-spacing:.4em;text-transform:uppercase;color:var(--ml);margin-bottom:.5rem;text-align:center}
.video-section .st{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:300;text-align:center;margin-bottom:2.5rem}
.video-section .st em{font-style:italic}
.video-wrap{max-width:900px;margin:0 auto;position:relative;aspect-ratio:16/9;overflow:hidden;border:1px solid var(--border);border-radius:4px;background:#000}
.video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
.video-wrap .vt{position:absolute;inset:0;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2}
.video-wrap .vt img{width:100%;height:100%;object-fit:cover;filter:brightness(.6);transition:filter .3s}
.video-wrap .vt:hover img{filter:brightness(.8)}
.video-wrap .vt .play-icon{position:absolute;z-index:3;transition:transform .3s}
.video-wrap .vt:hover .play-icon{transform:scale(1.1)}

/* FOOTER */
.footer{border-top:1px solid var(--border);padding:3rem;text-align:center}
.footer p{font-size:.75rem;color:var(--muted);letter-spacing:.15em}
.footer a{color:var(--ml);transition:color .3s}
.footer a:hover{color:var(--white)}
/* ANIMATIONS */
@keyframes fi{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.rv{opacity:0;transform:translateY(25px);transition:opacity .9s,transform .9s}
.rv.visible{opacity:1;transform:translateY(0)}
.fade{animation:fi 1.2s both}
.fade-d1{animation-delay:.2s}
.fade-d2{animation-delay:.4s}
.fade-d3{animation-delay:.6s}
.fade-d4{animation-delay:.8s}
/* RESPONSIVE */
@media(max-width:768px){
  nav{padding:1rem 1.2rem}
  .nav-toggle{display:flex}
  .nav-links{position:fixed;top:0;right:-100%;width:70vw;max-width:300px;height:100vh;background:rgba(10,10,10,.97);backdrop-filter:blur(20px);flex-direction:column;justify-content:center;align-items:center;gap:2.5rem;transition:right .4s;z-index:100;border-left:1px solid var(--border)}
  .nav-links.open{right:0}
  .nav-links a{font-size:1rem}
  .hero{min-height:auto;padding:7rem 0 4rem}
  .hero-inner{grid-template-columns:1fr;gap:2rem;text-align:center;padding:0 1.2rem}
  .art-wrap{order:1}
  .track-info{order:2}
  .art-img{max-width:260px;margin:0 auto}
  .stream-links{justify-content:center}
  .video-section{padding:4rem 1.2rem}
}
</style>
</head>
<body>
<div class="page-bg"><img src="daszi_stage.jpg" alt=""></div>

<nav id="nav">
  <a href="index.html" class="nav-brand">daszi</a>
  <div class="nav-toggle" id="navToggle"><span></span><span></span><span></span></div>
  <div class="nav-links" id="navLinks">
    <a href="index.html#music">Music</a>
    <a href="index.html#about">About</a>
    <a href="index.html">Home</a>
  </div>
</nav>

<!-- HERO — Single Track Spotlight -->
<section class="hero">
  <div class="hero-bg"><img src="art_kumbasaram.jpg" alt=""></div>
  <div class="hero-inner">
    <div class="art-wrap fade fade-d1">
      <div class="art-glow"></div>
      <div class="art-img"><img src="art_kumbasaram.jpg" alt="Kumbasaram"></div>
    </div>
    <div class="track-info">
      <p class="track-label fade fade-d1">Latest Release</p>
      <h1 class="track-title fade fade-d2">Kumbasaram</h1>
      <p class="track-artists fade fade-d3">STIC &amp; daszi</p>
      <p class="track-meta fade fade-d3">Single &middot; 2025 &middot; Karupp Records</p>
      <div class="stream-links fade fade-d4">
        <a href="https://open.spotify.com/artist/0afiI57tEFIwLFQBZC71sp" target="_blank" class="stream-btn primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M8 15c3-1 6-1 9 .5M7 12c4-1.5 8-1.5 11 .5M6.5 9c4.5-1.5 9.5-1.5 12.5 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>
          Spotify
        </a>
        <a href="https://music.apple.com/us/artist/daszi/1650092743" target="_blank" class="stream-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V7l10-2v11"/><circle cx="6.5" cy="18" r="2.5"/><circle cx="16.5" cy="16" r="2.5"/></svg>
          Apple Music
        </a>
        <a href="https://www.youtube.com/watch?v=TZY5K9YQfiA" target="_blank" class="stream-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="4"/><polygon points="10,8 16,12 10,16" fill="currentColor" stroke="none"/></svg>
          YouTube
        </a>
      </div>
    </div>
  </div>
</section>
<!-- MUSIC VIDEO -->
<section class="video-section">
  <div class="rv">
    <p class="sl">Music Video</p>
    <h2 class="st"><em>Watch</em></h2>
  </div>
  <div class="video-wrap rv" id="yt-wrap">
    <div class="vt" id="yt-thumb">
      <img src="https://img.youtube.com/vi/TZY5K9YQfiA/maxresdefault.jpg" alt="Kumbasaram Music Video" onerror="this.src='art_kumbasaram.jpg'">
      <div class="play-icon"><svg viewBox="0 0 68 48" width="68" height="48"><path d="M66.52 7.74c-.78-2.93-2.49-5.41-5.42-6.19C55.79.13 34 0 34 0S12.21.13 6.9 1.55c-2.93.78-4.63 3.26-5.42 6.19C.06 13.05 0 24 0 24s.06 10.95 1.48 16.26c.78 2.93 2.49 5.41 5.42 6.19C12.21 47.87 34 48 34 48s21.79-.13 27.1-1.55c2.93-.78 4.64-3.26 5.42-6.19C67.94 34.95 68 24 68 24s-.06-10.95-1.48-16.26z" fill="red"/><path d="M45 24L27 14v20" fill="white"/></svg></div>
    </div>
  </div>
</section>



<!-- FOOTER -->
<div class="footer">
  <p><a href="index.html">daszi</a> &middot; <a href="index.html#music">All Music</a> &middot; <a href="showreel.html">Showreel</a></p>
</div>

<script>
var nav=document.getElementById('nav');
var navToggle=document.getElementById('navToggle');
var navLinks=document.getElementById('navLinks');
window.addEventListener('scroll',function(){nav.classList.toggle('scrolled',window.pageYOffset>80)});
navToggle.addEventListener('click',function(){navToggle.classList.toggle('active');navLinks.classList.toggle('open')});
navLinks.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){navToggle.classList.remove('active');navLinks.classList.remove('open')})});
var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target)}})},{threshold:.1,rootMargin:'0px 0px -40px 0px'});
document.querySelectorAll('.rv').forEach(function(el){obs.observe(el)});
// YouTube click-to-play
document.getElementById('yt-thumb').addEventListener('click',function(e){
  e.preventDefault();
  var wrap=document.getElementById('yt-wrap');
  var iframe=document.createElement('iframe');
  iframe.src='https://www.youtube.com/embed/TZY5K9YQfiA?autoplay=1&rel=0';
  iframe.frameBorder='0';
  iframe.allow='accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture';
  iframe.allowFullscreen=true;
  wrap.appendChild(iframe);
  this.style.display='none';
});
</script>
</body>
</html>
